<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>英文冒險王 Pro</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>

<body>

<h1>🎮 英文冒險王 PRO</h1>

<div>⭐ 分數：<span id="score"></span></div>
<div>🏆 等級：<span id="level"></span></div>

<div id="word" class="word"></div>

<button onclick="speak()">🔊 發音</button>
<button onclick="startVoice()">🎤 說出來</button>

<div id="choices"></div>

<!-- 🎲 抽卡系統 -->
<h2>🎲 抽卡</h2>
<div id="gacha"></div>
<button onclick="drawPokemon()">抽寶可夢（10分）</button>

<!-- 📘 新圖鑑系統 -->
<h2>📘 圖鑑</h2>
<div id="progress"></div>
<div id="pokedex" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;"></div>

<script src="words.js"></script>
<script src="app.js"></script>

<script>
document.getElementById("score").innerText = localStorage.getItem("score") || 0;
document.getElementById("level").innerText = 1;
</script>

</body>
</html>
