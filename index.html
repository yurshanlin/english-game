<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英文冒險王 PRO</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<style>
body{
  font-family: Arial;
  text-align:center;
  padding:10px;
}

.word{
  font-size:40px;
  margin:20px;
}

button{
  margin:5px;
  padding:10px 15px;
  font-size:16px;
}

#choices button{
  display:block;
  width:80%;
  margin:8px auto;
}

/* 🔥 Boss UI */
#bossBox{
  margin:15px;
  padding:10px;
  border:2px solid #ff5555;
  border-radius:10px;
}

#bossHpBar{
  height:20px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
}

#bossHp{
  height:100%;
  background:red;
  width:100%;
  transition:0.3s;
}

/* 🎲 抽卡圖片 */
#gacha img{
  margin:10px;
}

/* ========================= */
/* 🔥✨ 抽卡光環動畫（關鍵） */
/* ========================= */

/* ⭐ 金光 SSR */
@keyframes glowGold {
  0%   { box-shadow:0 0 10px gold; }
  100% { box-shadow:0 0 40px gold; }
}

/* 🔵 藍光 Rare */
@keyframes glowBlue {
  0%   { box-shadow:0 0 5px #4da6ff; }
  100% { box-shadow:0 0 25px #4da6ff; }
}

/* 卡片基本樣式 */
.gacha-card{
  padding:15px;
  border-radius:15px;
  margin-top:10px;
  display:inline-block;
  transition:0.3s;
}

/* SSR（金） */
.legend{
  border:4px solid gold;
  animation: glowGold 1s infinite alternate;
  transform: scale(1.1);
}

/* 稀有（藍） */
.rare{
  border:3px solid #4da6ff;
  animation: glowBlue 1s infinite alternate;
}

/* 普通 */
.common{
  border:2px solid #ccc;
}

/* ✨（可選）輕微漂浮效果 */
@keyframes float {
  0% { transform: translateY(0px); }
  100% { transform: translateY(-5px); }
}

.legend, .rare{
  animation: glowGold 1s infinite alternate, float 1s infinite alternate;
}
</style>

</head>

<body>

<h1>🎮 英文冒險王 PRO</h1>

<div>⭐ 分數：<span id="score">0</span></div>
<div>🏆 等級：<span id="level">1</span></div>

<!-- 📅 每日任務 -->
<div id="daily"></div>

<!-- 🔥 Boss戰 -->
<div id="bossBox" style="display:none;">
  <h3>👾 BOSS戰</h3>
  <div id="bossName"></div>
  <div id="bossHpBar">
    <div id="bossHp"></div>
  </div>
</div>

<!-- 單字 -->
<div id="word" class="word"></div>

<button onclick="speak()">🔊 發音</button>
<button onclick="startVoice()">🎤 說出來</button>

<div id="choices"></div>

<!-- 🎲 抽卡 -->
<h2>🎲 抽卡</h2>
<div id="gacha"></div>
<button onclick="drawPokemon()">抽寶可夢（10分）</button>

<!-- 📘 圖鑑 -->
<h2>📘 圖鑑</h2>
<div id="progress"></div>
<div id="pokedex" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;"></div>

<script src="words.js"></script>
<script src="app.js"></script>

<script>
document.getElementById("score").innerText =
  localStorage.getItem("score") || 0;

document.getElementById("level").innerText =
  localStorage.getItem("level") || 1;
</script>

</body>
</html>
